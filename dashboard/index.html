<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaprMQ Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.priority-0-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            color: #f56565;
            font-size: 24px;
            font-weight: bold;
        }

        .modal-close {
            background: none;
            font-size: 24px;
            padding: 0;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .error-status {
            font-size: 18px;
            color: #a0aec0;
            margin-bottom: 10px;
        }

        .error-message {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 8px;
            color: #ffffff;
            font-family: monospace;
            word-wrap: break-word;
        }

        .message-container {
            position: relative;
        }

        .priority-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
        }

        .priority-0 {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .priority-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .priority-2 {
            background: linear-gradient(135deg, #00d4aa 0%, #00bfa5 100%);
        }

        .priority-default {
            background: linear-gradient(135deg, #a0aec0 0%, #718096 100%);
        }

        .lock-info {
            font-size: 12px;
            color: #00d4aa;
            margin-top: 0;
            padding: 12px 15px;
            background: rgba(0, 212, 170, 0.15);
            border-radius: 0 0 8px 8px;
            border-top: 2px solid rgba(0, 212, 170, 0.3);
        }

        .message-container pre:has(+ .lock-info) {
            margin-bottom: 0;
            border-radius: 8px 8px 0 0;
        }

        .lock-id {
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
        }

        .lock-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .lock-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
        }

        .ack-btn {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }

        .deadletter-btn {
            background: linear-gradient(135deg, #fc8181 0%, #f56565 100%);
        }

        .lock-info.acknowledged {
            background: rgba(72, 187, 120, 0.15);
            border-top-color: rgba(72, 187, 120, 0.3);
            color: #48bb78;
        }

        .lock-info.deadlettered {
            background: rgba(245, 101, 101, 0.15);
            border-top-color: rgba(245, 101, 101, 0.3);
            color: #f56565;
        }

        .lock-info a {
            color: inherit;
            font-weight: bold;
        }

        .lock-info a:hover {
            opacity: 0.8;
        }

        .queue-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 12px;
            vertical-align: middle;
        }

        .deadletter-badge {
            background: linear-gradient(135deg, #fc8181 0%, #f56565 100%);
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(245, 101, 101, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = 'http://localhost:8002';

        const generateQueueId = () => {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let id = 'queue-';
            for (let i = 0; i < 6; i++) {
                id += chars[Math.floor(Math.random() * chars.length)];
            }
            return id;
        };

        const generatePayload = () => ({
            userId: Math.floor(Math.random() * 9000) + 1000,
            action: ['login', 'logout', 'purchase', 'signup'][Math.floor(Math.random() * 4)],
            timestamp: new Date().toISOString()
        });

        const ErrorModal = ({ error, onClose }) => {
            if (!error) return null;

            return (
                <div className="modal show" onClick={(e) => e.target.className.includes('modal') && onClose()}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <div className="modal-title">Error</div>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>
                        <div className="modal-body">
                            <div className="error-status">Status: {error.status}</div>
                            <div className="error-message">
                                {typeof error.data === 'string'
                                    ? error.data
                                    : JSON.stringify(error.data, null, 2)}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [queueId] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                return params.get('queue_name') || generateQueueId();
            });
            const [currentPayload, setCurrentPayload] = useState(() => generatePayload());
            const [messagesPushed, setMessagesPushed] = useState(0);
            const [messagesPopped, setMessagesPopped] = useState(0);
            const [showPopSection, setShowPopSection] = useState(false);
            const [poppedMessages, setPoppedMessages] = useState([]);
            const [isPushing, setIsPushing] = useState(false);
            const [isPopping, setIsPopping] = useState(false);
            const [error, setError] = useState(null);

            const isDeadLetterQueue = queueId.endsWith('-deadletter');

            const getPriorityClass = (priority) => {
                if (priority === 0) return 'priority-0';
                if (priority === 1) return 'priority-1';
                if (priority === 2) return 'priority-2';
                return 'priority-default';
            };

            const pushMessage = async (priority) => {
                setIsPushing(true);
                try {
                    const response = await fetch(`${API_BASE}/queue/${queueId}/push`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ item: currentPayload, priority })
                    });

                    if (response.ok) {
                        setMessagesPushed(prev => prev + 1);
                        setCurrentPayload(generatePayload());
                        setShowPopSection(true);
                    } else {
                        const errorData = await response.json().catch(() => ({ message: 'Unknown error' }));
                        setError({ status: response.status, data: errorData });
                    }
                } catch (err) {
                    setError({ status: 'Network Error', data: err.message });
                } finally {
                    setIsPushing(false);
                }
            };

            const popMessage = async () => {
                setIsPopping(true);
                try {
                    const response = await fetch(`${API_BASE}/queue/${queueId}/pop`, {
                        method: 'POST'
                    });

                    if (response.status === 204) {
                        alert('Queue is empty');
                    } else if (response.ok) {
                        const data = await response.json();
                        setMessagesPopped(prev => prev + 1);
                        setPoppedMessages(prev => [{ item: data.item, priority: data.priority }, ...prev]);
                    } else {
                        const errorData = await response.json().catch(() => ({ message: 'Unknown error' }));
                        setError({ status: response.status, data: errorData });
                    }
                } catch (err) {
                    setError({ status: 'Network Error', data: err.message });
                } finally {
                    setIsPopping(false);
                }
            };

            const popWithAck = async () => {
                setIsPopping(true);
                try {
                    const response = await fetch(`${API_BASE}/queue/${queueId}/pop`, {
                        method: 'POST',
                        headers: { 'require_ack': 'true' }
                    });

                    if (response.status === 204) {
                        alert('Queue is empty');
                    } else if (response.ok) {
                        const data = await response.json();
                        setMessagesPopped(prev => prev + 1);
                        setPoppedMessages(prev => [{
                            item: data.item,
                            priority: data.priority,
                            locked: data.locked,
                            lockId: data.lockId,
                            lockExpiresAt: data.lockExpiresAt
                        }, ...prev]);
                    } else {
                        const errorData = await response.json().catch(() => ({ message: 'Unknown error' }));
                        setError({ status: response.status, data: errorData });
                    }
                } catch (err) {
                    setError({ status: 'Network Error', data: err.message });
                } finally {
                    setIsPopping(false);
                }
            };

            const acknowledgeMessage = async (e, lockId, index) => {
                e.preventDefault();
                e.stopPropagation();

                try {
                    const response = await fetch(`${API_BASE}/queue/${queueId}/acknowledge`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lockId })
                    });

                    if (response.ok) {
                        // Update message status to acknowledged
                        setPoppedMessages(prev => prev.map((msg, i) =>
                            i === index ? { ...msg, acknowledged: true } : msg
                        ));
                    } else {
                        const errorData = await response.json().catch(() => ({ message: 'Unknown error' }));
                        setError({ status: response.status, data: errorData });
                    }
                } catch (err) {
                    setError({ status: 'Network Error', data: err.message });
                }
            };

            const deadLetterMessage = async (e, lockId, index) => {
                e.preventDefault();
                e.stopPropagation();

                try {
                    const response = await fetch(`${API_BASE}/queue/${queueId}/deadletter`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lockId })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const dlqName = data.dlqActorId || `${queueId}-deadletter`;
                        // Update message status to dead lettered
                        setPoppedMessages(prev => prev.map((msg, i) =>
                            i === index ? { ...msg, deadLettered: true, dlqActorId: dlqName } : msg
                        ));
                    } else {
                        const errorData = await response.json().catch(() => ({ message: 'Unknown error' }));
                        setError({ status: response.status, data: errorData });
                    }
                } catch (err) {
                    setError({ status: 'Network Error', data: err.message });
                }
            };

            return (
                <>
                    <div className="container">
                        <h1>DaprMQ Dashboard</h1>

                        <div className="card">
                            <h3>
                                Queue: <span>{queueId}</span>
                                {isDeadLetterQueue && (
                                    <span className="queue-badge deadletter-badge">☠️ DEAD LETTER</span>
                                )}
                            </h3>
                            <p>Stats: <span>{messagesPushed} pushed | {messagesPopped} popped</span></p>
                        </div>

                        <div className="card">
                            <h3>Push a payload</h3>
                            <pre>{JSON.stringify(currentPayload, null, 2)}</pre>
                            <button className="priority-0-btn" onClick={() => pushMessage(0)} disabled={isPushing}>
                                {isPushing ? 'Pushing...' : 'Push with Priority 0'}
                            </button>
                            <button onClick={() => pushMessage(1)} disabled={isPushing}>
                                {isPushing ? 'Pushing...' : 'Push with Priority 1'}
                            </button>
                        </div>

                        {showPopSection && (
                            <div className="card">
                                <h3>Pop Messages</h3>
                                <button onClick={popMessage} disabled={isPopping}>
                                    {isPopping ? 'Popping...' : 'Pop from Queue'}
                                </button>
                                <button onClick={popWithAck} disabled={isPopping}>
                                    {isPopping ? 'Popping...' : 'Pop with Ack'}
                                </button>
                            </div>
                        )}

                        {poppedMessages.length > 0 && (
                            <div className="card">
                                <h3>Popped Messages ({poppedMessages.length})</h3>
                                {poppedMessages.map((msg, index) => (
                                    <div key={index} className="message-container" style={{ marginBottom: index < poppedMessages.length - 1 ? '10px' : '0' }}>
                                        <div className={`priority-badge ${getPriorityClass(msg.priority)}`}>
                                            P{msg.priority ?? '?'}
                                        </div>
                                        <pre>
                                            {JSON.stringify(msg.item, null, 2)}
                                        </pre>
                                        {msg.locked && msg.lockId && (
                                            <div className={`lock-info ${msg.acknowledged ? 'acknowledged' : ''} ${msg.deadLettered ? 'deadlettered' : ''}`}>
                                                {msg.acknowledged ? (
                                                    <div>✓ <strong>Message acknowledged successfully</strong></div>
                                                ) : msg.deadLettered ? (
                                                    <div>
                                                        ✕ <strong>Message moved to dead-letter queue </strong>
                                                        <a
                                                            href={`?queue_name=${msg.dlqActorId}`}
                                                            target="_blank"
                                                            rel="noopener noreferrer"
                                                            style={{color: '#f56565', textDecoration: 'underline'}}
                                                        >
                                                            ({msg.dlqActorId})
                                                        </a>
                                                    </div>
                                                ) : (
                                                    <>
                                                        🔒 <strong>Locked</strong> - Requires acknowledgement
                                                        <div className="lock-id">Lock ID: {msg.lockId}</div>
                                                        {msg.lockExpiresAt && (
                                                            <div>Expires: {new Date(msg.lockExpiresAt * 1000).toLocaleString()}</div>
                                                        )}
                                                        <div className="lock-actions">
                                                            <button className="ack-btn" onClick={(e) => acknowledgeMessage(e, msg.lockId, index)}>
                                                                ✓ Acknowledge
                                                            </button>
                                                            <button className="deadletter-btn" onClick={(e) => deadLetterMessage(e, msg.lockId, index)}>
                                                                ✕ Dead Letter
                                                            </button>
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <ErrorModal error={error} onClose={() => setError(null)} />
                </>
            );
        };

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
