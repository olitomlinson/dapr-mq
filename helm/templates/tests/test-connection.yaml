apiVersion: v1
kind: Pod
metadata:
  name: {{ include "daprmq.fullname" . }}-test-connection
  labels:
    {{- include "daprmq.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
  - name: test
    image: curlimages/curl:latest
    command:
    - /bin/sh
    - -c
    - |
      echo "Testing connection to DaprMQ gateway..."

      # Wait for gateway pod to be ready
      sleep 10

      # Test health endpoint (always on HTTP port)
      echo "Testing health endpoint..."
      curl -f http://{{ include "daprmq.fullname" . }}-gateway:{{ .Values.gateway.httpPort }}/health

      if [ $? -eq 0 ]; then
        echo "Health check passed!"
        exit 0
      else
        echo "Health check failed!"
        exit 1
      fi
  restartPolicy: Never
