{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "daprmq.fullname" . }}-dashboard
  labels:
    {{- include "daprmq.dashboard.labels" . | nindent 4 }}
data:
  default.conf.template: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

        # Health check endpoint
        location = /health {
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }

        # Proxy API requests to DaprMQ gateway via Service
        # ${GATEWAY_SERVICE} and ${GATEWAY_PORT} are substituted by nginx entrypoint at startup
        location /queue/ {
            proxy_pass http://${GATEWAY_SERVICE}:${GATEWAY_PORT}/queue/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA fallback - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Disable caching for index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
    }
{{- end }}
