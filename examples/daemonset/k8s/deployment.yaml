apiVersion: apps/v1
kind: Deployment
metadata:
  name: daprmq-example
  labels:
    app: daprmq-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: daprmq-example
  template:
    metadata:
      labels:
        app: daprmq-example
    spec:
      containers:
        - name: app
          image: daprmq-example:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            # Inject node IP via Kubernetes downward API
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: GATEWAY_PORT
              value: "8091"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
